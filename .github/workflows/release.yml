name: Release

on:
  push:
    tags:
      - 'v*'  # 当推送v开头的标签时触发，例如 v1.0.0
  workflow_dispatch:  # 允许手动触发
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  APP_NAME: wood_cutter
  CARGO_INCREMENTAL: 0

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
    - name: Get version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="dev-$(date +'%Y%m%d-%H%M%S')"
          fi
        else
          VERSION="${GITHUB_REF#refs/tags/}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.APP_NAME }} ${{ steps.get_version.outputs.version }}
        tag_name: ${{ steps.get_version.outputs.version }}
        draft: true
        prerelease: false
        generate_release_notes: true
        body: |
          # ${{ env.APP_NAME }} ${{ steps.get_version.outputs.version }}
          
          ## 功能特性
          - 基于 egui 的图形界面
          - 支持多种布局算法：NFP、GA、SA、SVGNest、MaxRects
          - 跨平台支持 (Windows, macOS, Linux)
          
          ## 安装说明
          请下载对应您操作系统的版本：
          - **Windows**: 下载 `.exe` 文件或 `.zip` 压缩包
          - **macOS Intel**: 下载 `-macos-amd64` 文件
          - **macOS Apple Silicon**: 下载 `-macos-arm64` 文件
          - **Linux**: 下载 `-linux-amd64` 文件
          
          ## 运行说明
          1. 下载对应系统的文件
          2. 赋予执行权限 (仅限 Linux/macOS): `chmod +x wood_cutter-*`
          3. 双击运行或在终端中运行
          
          ## 更新日志
          - 请查看提交历史了解详细更新
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build - ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: wood_cutter
            asset_name: wood_cutter-linux-amd64
            asset_content_type: application/octet-stream
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: wood_cutter.exe
            asset_name: wood_cutter-windows-amd64.exe
            asset_content_type: application/vnd.microsoft.portable-executable
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: wood_cutter
            asset_name: wood_cutter-macos-amd64
            asset_content_type: application/octet-stream
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: wood_cutter
            asset_name: wood_cutter-macos-arm64
            asset_content_type: application/octet-stream

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxkbcommon-dev \
          libssl-dev \
          libfontconfig1-dev \
          libx11-dev \
          libxcb1-dev

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Test executable (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        chmod +x target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
        # 可选：运行简单的版本检查
        target/${{ matrix.target }}/release/${{ matrix.artifact_name }} --version || true

    - name: Create package (Unix)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        chmod +x ${{ matrix.artifact_name }}
        
        # 创建包含可执行文件和README的目录
        PACKAGE_DIR="${{ matrix.asset_name }}-package"
        mkdir -p $PACKAGE_DIR
        
        # 复制可执行文件
        cp ${{ matrix.artifact_name }} $PACKAGE_DIR/
        
        # 创建README文件
        cat > $PACKAGE_DIR/README.txt << EOF
        ${{ env.APP_NAME }} - 版本: ${{ github.ref_name }}
        构建日期: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        目标平台: ${{ matrix.target }}
        
        运行说明:
        - 在终端中运行: ./${{ matrix.artifact_name }}
        - 或双击运行（如果系统支持）
        
        如果遇到权限问题，请运行:
        chmod +x ${{ matrix.artifact_name }}
        
        需要帮助? 请访问: ${{ github.server_url }}/${{ github.repository }}
        EOF
        
        # 打包为.tar.gz
        tar czf ${{ matrix.asset_name }}.tar.gz $PACKAGE_DIR/
        
        # 计算SHA256
        sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
        
        # 移动到输出目录
        mkdir -p ../../../artifacts
        mv ${{ matrix.asset_name }}.tar.gz ../../../artifacts/
        mv ${{ matrix.asset_name }}.tar.gz.sha256 ../../../artifacts/

    - name: Create package (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        
        # 创建包含可执行文件和README的目录
        PACKAGE_DIR="${{ matrix.asset_name }}-package"
        mkdir -p $PACKAGE_DIR
        
        # 复制可执行文件
        cp ${{ matrix.artifact_name }} $PACKAGE_DIR/
        
        # 创建README文件
        cat > $PACKAGE_DIR/README.txt << EOF
        ${{ env.APP_NAME }} - 版本: ${{ github.ref_name }}
        构建日期: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        目标平台: Windows
        
        运行说明:
        - 双击运行 ${{ matrix.artifact_name }}
        
        需要帮助? 请访问: ${{ github.server_url }}/${{ github.repository }}
        EOF
        
        # 打包为.zip
        7z a -tzip ${{ matrix.asset_name }}.zip $PACKAGE_DIR/
        
        # 计算SHA256 (Windows)
        if command -v sha256sum &> /dev/null; then
          sha256sum ${{ matrix.asset_name }}.zip > ${{ matrix.asset_name }}.zip.sha256
        else
          # 使用PowerShell计算SHA256
          powershell -Command "Get-FileHash ${{ matrix.asset_name }}.zip -Algorithm SHA256 | ForEach-Object { $_.Hash.ToLower() + '  ' + $_.Path }" > ${{ matrix.asset_name }}.zip.sha256
        fi
        
        # 移动到输出目录
        mkdir -p ../../../artifacts
        mv ${{ matrix.asset_name }}.zip ../../../artifacts/
        mv ${{ matrix.asset_name }}.zip.sha256 ../../../artifacts/

    - name: Upload individual binary to release
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-release.outputs.release_id }}
        files: |
          target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          artifacts/${{ matrix.asset_name }}.tar.gz
          artifacts/${{ matrix.asset_name }}.zip
          artifacts/${{ matrix.asset_name }}.tar.gz.sha256
          artifacts/${{ matrix.asset_name }}.zip.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-checksums:
    name: Upload checksums
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
        
    - name: Generate checksums
      run: |
        cd artifacts
        # 生成所有文件的校验和
        sha256sum * > checksums.txt
        cat checksums.txt
        
    - name: Upload checksums to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-release.outputs.release_id }}
        files: artifacts/checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    name: Finalize Release
    needs: [create-release, build, upload-checksums]
    runs-on: ubuntu-latest
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    steps:
    - name: Publish Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-release.outputs.release_id }}
        draft: false  # 设置为false表示发布release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
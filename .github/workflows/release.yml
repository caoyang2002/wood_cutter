name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.0.0)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  APP_NAME: wood_cutter
  CARGO_INCREMENTAL: 0

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Get version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          VERSION="${{ github.event.inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="dev-$(date +'%Y%m%d-%H%M%S')"
          fi
        else
          VERSION="${GITHUB_REF#refs/tags/}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ env.APP_NAME }} ${{ steps.get_version.outputs.version }}
        tag_name: ${{ steps.get_version.outputs.version }}
        draft: true
        prerelease: false
        generate_release_notes: true
        body: |
          # ${{ env.APP_NAME }} ${{ steps.get_version.outputs.version }}
          
          ## 功能特性
          - 基于 egui 的图形界面
          - 支持多种布局算法：NFP、GA、SA、SVGNest、MaxRects
          - 跨平台支持 (Windows, macOS, Linux)
          
          ## 安装说明
          请下载对应您操作系统的版本：
          - **Windows**: 下载 `.exe` 文件或 `.zip` 压缩包
          - **macOS Intel**: 下载 `-macos-amd64` 文件
          - **macOS Apple Silicon**: 下载 `-macos-arm64` 文件
          - **Linux**: 下载 `-linux-amd64` 文件
          
          ## 运行说明
          1. 下载对应系统的文件
          2. 赋予执行权限 (仅限 Linux/macOS): `chmod +x wood_cutter-*`
          3. 双击运行或在终端中运行
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build - ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: wood_cutter
            asset_name: wood_cutter-linux-amd64
            asset_content_type: application/octet-stream
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: wood_cutter.exe
            asset_name: wood_cutter-windows-amd64.exe
            asset_content_type: application/vnd.microsoft.portable-executable
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: wood_cutter
            asset_name: wood_cutter-macos-amd64
            asset_content_type: application/octet-stream
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: wood_cutter
            asset_name: wood_cutter-macos-arm64
            asset_content_type: application/octet-stream

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxkbcommon-dev \
          libssl-dev \
          libfontconfig1-dev \
          libx11-dev \
          libxcb1-dev

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Create artifacts directory
      run: mkdir -p artifacts

    - name: Prepare binary (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        chmod +x target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
        # 创建二进制文件的副本
        cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}
        # 创建压缩包
        tar -czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}
        # 生成校验和
        sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
        sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
        # 移动到artifacts目录
        mv ${{ matrix.asset_name }} artifacts/
        mv ${{ matrix.asset_name }}.tar.gz artifacts/
        mv ${{ matrix.asset_name }}.sha256 artifacts/
        mv ${{ matrix.asset_name }}.tar.gz.sha256 artifacts/

    - name: Prepare binary (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        # 创建二进制文件的副本
        cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ./${{ matrix.asset_name }}
        # 创建压缩包
        7z a -tzip ${{ matrix.asset_name }}.zip ${{ matrix.asset_name }}
        # 生成校验和
        if command -v sha256sum &> /dev/null; then
          sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          sha256sum ${{ matrix.asset_name }}.zip > ${{ matrix.asset_name }}.zip.sha256
        else
          powershell -Command "Get-FileHash ${{ matrix.asset_name }} -Algorithm SHA256 | ForEach-Object { $_.Hash.ToLower() + '  ' + $_.Path }" > ${{ matrix.asset_name }}.sha256
          powershell -Command "Get-FileHash ${{ matrix.asset_name }}.zip -Algorithm SHA256 | ForEach-Object { $_.Hash.ToLower() + '  ' + $_.Path }" > ${{ matrix.asset_name }}.zip.sha256
        fi
        # 移动到artifacts目录
        mkdir -p artifacts
        mv ${{ matrix.asset_name }} artifacts/
        mv ${{ matrix.asset_name }}.zip artifacts/
        mv ${{ matrix.asset_name }}.sha256 artifacts/
        mv ${{ matrix.asset_name }}.zip.sha256 artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}-artifacts
        path: artifacts/
        retention-days: 1

    - name: Upload to release
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-release.outputs.version }}
        files: |
          artifacts/${{ matrix.asset_name }}
          artifacts/${{ matrix.asset_name }}.tar.gz
          artifacts/${{ matrix.asset_name }}.zip
          artifacts/${{ matrix.asset_name }}.sha256
          artifacts/${{ matrix.asset_name }}.tar.gz.sha256
          artifacts/${{ matrix.asset_name }}.zip.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-checksums:
    name: Upload checksums
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true
        
    - name: Generate combined checksums
      run: |
        cd artifacts
        # 生成所有文件的校验和
        sha256sum * > checksums.txt
        cat checksums.txt
        
    - name: Upload checksums to release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-release.outputs.version }}
        files: artifacts/checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize-release:
    name: Finalize Release
    needs: [create-release, build, upload-checksums]
    runs-on: ubuntu-latest
    if: always() && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
    steps:
    - name: Publish Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.create-release.outputs.version }}
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

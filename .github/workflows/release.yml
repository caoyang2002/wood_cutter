name: Release

on:
  push:
    tags:
      - 'v*'  # 当推送v开头的标签时触发，例如 v1.0.0
  workflow_dispatch:  # 允许手动触发

env:
  CARGO_TERM_COLOR: always
  APP_NAME: wood_cutter

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: wood_cutter
            asset_name: wood_cutter-linux-amd64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact_name: wood_cutter
            asset_name: wood_cutter-linux-musl-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: wood_cutter.exe
            asset_name: wood_cutter-windows-amd64.exe
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact_name: wood_cutter.exe
            asset_name: wood_cutter-windows-gnu-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: wood_cutter
            asset_name: wood_cutter-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: wood_cutter
            asset_name: wood_cutter-macos-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Linux dependencies
      if: matrix.os == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxkbcommon-dev \
          libssl-dev \
          libfontconfig1-dev \
          libx11-dev \
          libxcb1-dev \
          libx11-xcb-dev \
          libxcb-randr0-dev \
          libxcb-icccm4-dev \
          libxcb-composite0-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-xkb-dev \
          libxcb-xinerama0-dev \
          libxcb-xinput-dev \
          libxcb-xrm-dev \
          libxcb-cursor-dev \
          libdbus-1-dev \
          libwebkit2gtk-4.0-dev

    - name: Install musl tools
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        sudo apt-get install -y musl-tools
        # 为musl安装静态OpenSSL
        sudo apt-get install -y pkg-config libssl-dev
        # 创建musl-gcc包装器
        sudo ln -s /usr/bin/gcc /usr/bin/x86_64-linux-musl-gcc

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}
      env:
        RUSTFLAGS: -C target-feature=+crt-static

    - name: Prepare asset
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        # 创建包含可执行文件和资源的目录
        mkdir -p ${{ matrix.asset_name }}
        cp ${{ matrix.artifact_name }} ${{ matrix.asset_name }}/
        
        # 如果有资源文件，可以复制
        if [ -d "../../../assets" ]; then
          cp -r ../../../assets ${{ matrix.asset_name }}/
        fi
        
        # 创建README文件
        cat > ${{ matrix.asset_name }}/README.txt << EOF
        ${{ env.APP_NAME }} - 版本: ${{ github.ref_name }}
        构建日期: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        目标平台: ${{ matrix.target }}
        
        运行说明:
        - Linux/macOS: 在终端中运行 ./${{ matrix.artifact_name }}
        - Windows: 双击运行 ${{ matrix.artifact_name }}.exe
        
        需要帮助? 请访问: ${{ github.server_url }}/${{ github.repository }}
        EOF
        
        # 打包
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          7z a -tzip ${{ matrix.asset_name }}.zip ${{ matrix.asset_name }}/
        else
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}/
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}.*

    - name: Upload to release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/${{ matrix.target }}/release/${{ matrix.asset_name }}.tar.gz
          target/${{ matrix.target }}/release/${{ matrix.asset_name }}.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APP_NAME: wood_cutter

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: wood_cutter
            asset_name: wood_cutter-linux-amd64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact_name: wood_cutter
            asset_name: wood_cutter-linux-musl-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: wood_cutter.exe
            asset_name: wood_cutter-windows-amd64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: wood_cutter
            asset_name: wood_cutter-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: wood_cutter
            asset_name: wood_cutter-macos-arm64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Install Linux dependencies (glibc)
      if: matrix.target == 'x86_64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxkbcommon-dev \
          libssl-dev \
          libfontconfig1-dev \
          libx11-dev \
          libxcb1-dev \
          libx11-xcb-dev \
          libxcb-randr0-dev \
          libxcb-icccm4-dev \
          libxcb-composite0-dev \
          libxcb-image0-dev \
          libxcb-keysyms1-dev \
          libxcb-xkb-dev \
          libxcb-xinerama0-dev \
          libxcb-xinput-dev \
          libxcb-xrm-dev \
          libxcb-cursor-dev \
          libdbus-1-dev \
          libwebkit2gtk-4.0-dev

    - name: Install musl dependencies
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools
        # 使用musl-gcc包装器，而不是创建符号链接
        # musl-tools 已经提供了 musl-gcc 命令

    - name: Set up musl environment
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        # 设置环境变量，让cargo使用musl-gcc
        echo "CC=musl-gcc" >> $GITHUB_ENV
        echo "AR=ar" >> $GITHUB_ENV
        
        # 创建用于静态链接的OpenSSL配置
        # 或者使用rustls替代openssl
        echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV
        
        # 安装静态版本的依赖
        sudo apt-get install -y \
          libssl-dev:amd64 \
          pkg-config

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build release (musl)
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        # 使用musl目标构建
        cargo build --release --target ${{ matrix.target }}
      env:
        RUSTFLAGS: -C target-feature=+crt-static
        PKG_CONFIG_ALLOW_CROSS: 1
        # 告诉pkg-config使用musl的配置
        PKG_CONFIG_PATH: /usr/lib/x86_64-linux-musl/pkgconfig

    - name: Build release (others)
      if: matrix.target != 'x86_64-unknown-linux-musl'
      run: cargo build --release --target ${{ matrix.target }}

    - name: Prepare asset (Unix)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        chmod +x ${{ matrix.artifact_name }}
        tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
        
    - name: Prepare asset (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        7z a -tzip ${{ matrix.asset_name }}.zip ${{ matrix.artifact_name }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}.*

    - name: Upload to release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/${{ matrix.target }}/release/${{ matrix.asset_name }}.tar.gz
          target/${{ matrix.target }}/release/${{ matrix.asset_name }}.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}